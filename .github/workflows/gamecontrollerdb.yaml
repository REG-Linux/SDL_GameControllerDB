# SDL_GameControllerDB Monitor Workflow
# This workflow monitors the SDL_GameControllerDB repository for updates
# and automatically processes the database file when changes are detected.
# Also monitors local add_gamecontrollerdb.txt file for changes.
#
# Features:
# - Daily automated checks for repository updates
# - Monitors local custom mappings file for changes
# - Appends custom controller mappings (add_gamecontrollerdb.txt)
# - Keeps Linux rows only, field-anchored on the platform: token
# - Splits the SDL2-HIDAPI lane into gamecontrollerdb-SDL2.txt, leaving only
#   joydev + SDL3-HIDAPI mappings in gamecontrollerdb.txt
# - Removes duplicate entries by GUID (per lane)
# - Commits changes automatically

name: SDL_GameControllerDB Monitor

on:
  # Manual trigger - allows running the workflow on demand
  workflow_dispatch:

  # Scheduled trigger - runs daily at midnight UTC
  schedule:
    - cron: "0 0 * * *" # Daily execution at midnight UTC

  # Push trigger - runs when changes are pushed to main branch
  push:
    branches: ["main"]
    paths:
      - "add_gamecontrollerdb.txt" # Trigger when custom mappings file changes

jobs:
  check-and-update:
    runs-on: ubuntu-latest

    # Required permissions to write to repository
    permissions:
      contents: write

    steps:
      # Step 1: Checkout the current repository
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0 # Fetch full history

      # Step 2: Get the latest commit from the external repository
      - name: Get latest commit from external repository
        id: check-remote
        run: |
          # Remote repository URL
          REMOTE_URL="https://github.com/mdqinc/SDL_GameControllerDB.git"

          # Get the latest commit hash from the remote repository
          LAST_COMMIT=$(git ls-remote $REMOTE_URL HEAD | awk '{print $1}')

          # Export the commit hash for use in subsequent steps
          echo "last_commit=$LAST_COMMIT" >> $GITHUB_OUTPUT

          # Log information for debugging
          echo "Latest commit in $REMOTE_URL: $LAST_COMMIT"
          echo "Check timestamp: $(date)"

      # Step 3: Check for changes in external repo and local custom file
      - name: Check for changes
        id: check-changes
        run: |
          CHANGES_DETECTED=false
          CHANGE_REASONS=""

          # Check external repository changes
          if [ -f ".last_known_commit" ]; then
            KNOWN_COMMIT=$(cat .last_known_commit)
            echo "Last recorded commit: $KNOWN_COMMIT"
            echo "New commit found: ${{ steps.check-remote.outputs.last_commit }}"

            # Compare commits to detect changes
            if [ "$KNOWN_COMMIT" != "${{ steps.check-remote.outputs.last_commit }}" ]; then
              CHANGES_DETECTED=true
              CHANGE_REASONS="External repository updated"
              echo "🔄 Changes detected in external repository!"
            fi
          else
            # First run - no previous commit recorded
            CHANGES_DETECTED=true
            CHANGE_REASONS="First run - initial setup"
            echo "🆕 First run - processing initial setup..."
          fi

          # Check if custom mappings file has changed
          if [ -f "add_gamecontrollerdb.txt" ]; then
            # Calculate hash of current custom file
            CURRENT_HASH=$(sha256sum add_gamecontrollerdb.txt | cut -d' ' -f1)

            if [ -f ".last_custom_hash" ]; then
              KNOWN_HASH=$(cat .last_custom_hash)
              echo "Last recorded custom file hash: $KNOWN_HASH"
              echo "Current custom file hash: $CURRENT_HASH"

              if [ "$KNOWN_HASH" != "$CURRENT_HASH" ]; then
                CHANGES_DETECTED=true
                if [ -n "$CHANGE_REASONS" ]; then
                  CHANGE_REASONS="$CHANGE_REASONS + Custom mappings file updated"
                else
                  CHANGE_REASONS="Custom mappings file updated"
                fi
                echo "🔧 Changes detected in custom mappings file!"
              fi
            else
              # First time seeing this file
              CHANGES_DETECTED=true
              if [ -n "$CHANGE_REASONS" ]; then
                CHANGE_REASONS="$CHANGE_REASONS + Custom mappings file found"
              else
                CHANGE_REASONS="Custom mappings file found"
              fi
              echo "📁 Custom mappings file found for first time"
            fi

            # Save current hash for next comparison
            echo "$CURRENT_HASH" > .last_custom_hash
          else
            # No custom file exists
            if [ -f ".last_custom_hash" ]; then
              # Custom file was deleted
              CHANGES_DETECTED=true
              if [ -n "$CHANGE_REASONS" ]; then
                CHANGE_REASONS="$CHANGE_REASONS + Custom mappings file removed"
              else
                CHANGE_REASONS="Custom mappings file removed"
              fi
              echo "🗑️ Custom mappings file was removed!"
              rm -f .last_custom_hash
            fi
          fi

          # Export results
          echo "changes_detected=$CHANGES_DETECTED" >> $GITHUB_OUTPUT
          echo "change_reasons=$CHANGE_REASONS" >> $GITHUB_OUTPUT

          if [ "$CHANGES_DETECTED" = "true" ]; then
            echo "✅ Changes detected: $CHANGE_REASONS"
          else
            echo "❌ No changes found."
          fi

      # Step 4: Process the database file if changes were detected
      - name: Process database (if changes detected)
        if: steps.check-changes.outputs.changes_detected == 'true'
        run: |
          echo "🔄 Processing changes: ${{ steps.check-changes.outputs.change_reasons }}"

          # Record the new commit hash
          echo "${{ steps.check-remote.outputs.last_commit }}" > .last_known_commit

          # Clone the external repository
          if [ -d "SDL_GameControllerDB" ]; then
            rm -rf SDL_GameControllerDB
          fi
          git clone https://github.com/mdqinc/SDL_GameControllerDB.git

          # Process the controller database into two lanes:
          #   gamecontrollerdb.txt       — joydev + SDL3-HIDAPI mappings
          #   gamecontrollerdb-SDL2.txt  — SDL2-HIDAPI mappings (driver-sig 'h',
          #                                dpad-as-buttons)
          # See CONTROLLER-MAPPING-DESIGN.md in the REG-Linux tree for the why.
          cd SDL_GameControllerDB
          WS="$GITHUB_WORKSPACE"

          # 1. Append the custom additions to the upstream DB.
          cp gamecontrollerdb.txt merged.txt
          if [ -f "$WS/add_gamecontrollerdb.txt" ]; then
            echo "📝 Appending custom mappings ($(grep -cE '^[0-9a-fA-F]{32},' "$WS/add_gamecontrollerdb.txt") rows)..."
            cat "$WS/add_gamecontrollerdb.txt" >> merged.txt
          else
            echo "ℹ️ No custom mappings file found"
          fi

          # 2. Keep Linux only, field-anchored on the platform: token. Rows whose
          #    platform is explicitly Windows/Mac/Android/iOS are dropped; Linux
          #    rows AND custom rows that omit a platform field are kept. Anchoring
          #    on ',platform:NAME,' avoids the old fragility of matching those
          #    words anywhere in a controller name. The leading 32-hex+comma match
          #    also drops comments and blank lines (a header is re-added below).
          grep -E '^[0-9a-fA-F]{32},' merged.txt \
            | grep -vE ',platform:(Windows|Mac OS X|Android|iOS),' > linux.txt
          echo "✅ Linux filter: $(wc -l < linux.txt) rows"

          # 3. Split the SDL2-HIDAPI lane from the rest. An SDL2-HIDAPI row has
          #    driver-sig 'h' (0x68 at GUID chars 29-30) AND presents the dpad as
          #    buttons; SDL3-HIDAPI uses a hat and joydev uses sig 0 — both stay
          #    in the main file. Same discriminator the package used to strip with.
          SDL2_RE='^[0-9a-fA-F]{28}68[0-9a-fA-F]{2},.*dp(up|down|left|right):b'
          grep -E  "$SDL2_RE" linux.txt > sdl2_lane.txt || true
          grep -vE "$SDL2_RE" linux.txt > main_lane.txt || true

          # 4. De-duplicate EACH lane by GUID, keeping the last occurrence so a
          #    custom row overrides an upstream one. Per-lane (not on the merged
          #    file) so an SDL2-HIDAPI row and its SDL3-HIDAPI sibling — which
          #    share a GUID over USB — never evict each other.
          tac main_lane.txt | awk -F',' '!seen[$1]++' | tac > main_dedup.txt
          tac sdl2_lane.txt | awk -F',' '!seen[$1]++' | tac > sdl2_dedup.txt

          # 5. Emit both files with a generated header.
          {
            echo "# Game Controller DB for SDL — REG-Linux (joydev + SDL3-HIDAPI lane)"
            echo "# Linux only. Generated from mdqinc/SDL_GameControllerDB + add_gamecontrollerdb.txt."
            echo "# SDL2-HIDAPI mappings live in gamecontrollerdb-SDL2.txt. Do not edit by hand."
            cat main_dedup.txt
          } > "$WS/gamecontrollerdb.txt"
          {
            echo "# Game Controller DB for SDL — REG-Linux SDL2-HIDAPI lane"
            echo "# Linux only. Driver-sig 'h', dpad-as-buttons. Appended by regmsgd"
            echo "# only for SDL2 emulators. Generated — do not edit by hand."
            cat sdl2_dedup.txt
          } > "$WS/gamecontrollerdb-SDL2.txt"

          # Display final statistics
          echo "📊 Final statistics:"
          echo "gamecontrollerdb.txt (joydev + SDL3-HIDAPI): $(wc -l < main_dedup.txt) mappings"
          echo "gamecontrollerdb-SDL2.txt (SDL2-HIDAPI):     $(wc -l < sdl2_dedup.txt) mappings"

          # Commit and push changes to the repository
          cd "$GITHUB_WORKSPACE"

          # Configure Git user for automated commits
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          # Stage all changes (including hash files)
          git add .

          # Check if there are any changes to commit
          if git diff-index --quiet HEAD --; then
            echo "⏩ No changes to commit"
          else
            # Commit with automated message including date and reason
            COMMIT_MSG="🔄 Automatic update [$(date +'%m/%d/%Y')] - ${{ steps.check-changes.outputs.change_reasons }}"
            git commit -m "$COMMIT_MSG"
            git push
            echo "🚀 Changes pushed to repository"
            echo "📝 Commit message: $COMMIT_MSG"
          fi

      # Step 5: Report status
      - name: Report status
        run: |
          if [ "${{ steps.check-changes.outputs.changes_detected }}" = "true" ]; then
            echo "✅ Workflow completed successfully - Changes processed"
            echo "📋 Reason: ${{ steps.check-changes.outputs.change_reasons }}"
          else
            echo "✅ Workflow completed successfully - No changes needed"
          fi

      # Step 6: Cleanup temporary files
      - name: Final cleanup
        run: |
          # Remove temporary cloned repository
          if [ -d "SDL_GameControllerDB" ]; then
            rm -rf SDL_GameControllerDB
            echo "🧹 Temporary files removed"
          fi
          echo "🏁 Cleanup completed"
